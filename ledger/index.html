mmary-card .label{font-size:.8em;color:var(--secondary)}.ledger-container .summary-card .value{font-size:1.4em;font-weight:700;margin-top:4px}.ledger-container .summary-card .value.positive{color:#2ecc71}.ledger-container .summary-card .value.negative{color:#e74c3c}.ledger-table{width:100%;border-collapse:collapse;margin-top:10px}.ledger-table th{padding:8px 10px;border:1px solid var(--border);text-align:left;font-size:.85em;background:var(--code-bg)}.ledger-table td{padding:8px 10px;border:1px solid var(--border);font-size:.85em}.ledger-table .amount{text-align:right;font-family:monospace}.ledger-table .amount.positive{color:#2ecc71}.ledger-table .amount.negative{color:#e74c3c}.ledger-table tr:hover{background:var(--tertiary)}.ledger-table .del-btn{cursor:pointer;color:#e74c3c;font-size:1.1em}.empty-msg{text-align:center;padding:40px;color:var(--secondary)}</style><script>(function(){const s="ledger_entries";let e=[];function o(){try{e=JSON.parse(localStorage.getItem(s))||[]}catch{e=[]}}function n(){localStorage.setItem(s,JSON.stringify(e))}function i(){const e=new Date;return e.getFullYear()+"-"+String(e.getMonth()+1).padStart(2,"0")+"-"+String(e.getDate()).padStart(2,"0")}function t(){const r=document.getElementById("ledger-app");if(!r)return;o();let n=0,s=0;const t={},a=["现金","银行存款","支付宝","微信","应收款","应付账款","收入","支出","投资","其他"];a.forEach(e=>t[e]=0),e.forEach(e=>{t[e.debit]=(t[e.debit]||0)+parseFloat(e.amount),t[e.credit]=(t[e.credit]||0)-parseFloat(e.amount),e.type==="收入"?s+=parseFloat(e.amount):n+=parseFloat(e.amount)});const c=s-n,l=Object.entries(t).filter(([,e])=>e!==0).sort((e,t)=>Math.abs(t[1])-Math.abs(e[1]));r.innerHTML=`
      <div class="ledger-container">
        <div class="form-row">
          <div class="form-group">
            <label>日期</label>
            <input type="date" id="l-date" value="${i()}">
          </div>
          <div class="form-group">
            <label>摘要</label>
            <input type="text" id="l-desc" placeholder="买什么/收入来源" style="width:160px;">
          </div>
          <div class="form-group">
            <label>类型</label>
            <select id="l-type"><option value="支出">支出</option><option value="收入">收入</option></select>
          </div>
          <div class="form-group">
            <label>借方科目</label>
            <select id="l-debit">
              ${a.map(e=>'<option value="'+e+'">'+e+"</option>").join("")}
            </select>
          </div>
          <div class="form-group">
            <label>贷方科目</label>
            <select id="l-credit">
              ${a.map(e=>'<option value="'+e+'">'+e+"</option>").join("")}
            </select>
          </div>
          <div class="form-group">
            <label>金额</label>
            <input type="number" id="l-amount" placeholder="0.00" step="0.01" min="0" style="width:100px;">
          </div>
          <div class="form-group" style="padding-bottom:2px;">
            <label>&nbsp;</label>
            <button onclick="addEntry()">➕ 记账</button>
          </div>
        </div>

        <div class="summary">
          <div class="summary-card">
            <div class="label">总收入</div>
            <div class="value positive">¥${s.toFixed(2)}</div>
          </div>
          <div class="summary-card">
            <div class="label">总支出</div>
            <div class="value negative">¥${n.toFixed(2)}</div>
          </div>
          <div class="summary-card">
            <div class="label">结余</div>
            <div class="value ${c>=0?"positive":"negative"}">¥${c.toFixed(2)}</div>
          </div>
          <div class="summary-card">
            <div class="label">总笔数</div>
            <div class="value">${e.length}</div>
          </div>
        </div>

        ${l.length>0?`
        <div style="margin:12px 0;">
          <div style="font-size:0.85em;font-weight:600;margin-bottom:6px;">📊 科目余额</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            ${l.map(([e,t])=>'<span style="font-size:0.8em;padding:3px 10px;border:1px solid var(--border);border-radius:12px;background:var(--entry);">'+e+": <b>"+(t>=0?"":"-")+"¥"+Math.abs(t).toFixed(2)+"</b></span>").join("")}
          </div>
        </div>`:""}

        ${e.length>0?`
        <table class="ledger-table">
          <tr><th>日期</th><th>摘要</th><th>类型</th><th>借方</th><th>贷方</th><th style="text-align:right;">金额</th><th></th></tr>
          ${e.slice().reverse().map((t,n)=>{const s=e.length-1-n;return"<tr><td>"+t.date+"</td><td>"+t.desc+'</td><td><span style="font-size:0.8em;padding:1px 6px;border-radius:4px;background:'+(t.type==="收入"?"#2ecc71":"#e74c3c")+';color:#fff;">'+t.type+"</span></td><td>"+t.debit+"</td><td>"+t.credit+'</td><td class="amount '+(t.type==="收入"?"positive":"negative")+'">'+(t.type==="收入"?"":"-")+"¥"+parseFloat(t.amount).toFixed(2)+'</td><td><span class="del-btn" onclick="delEntry('+s+')">✕</span></td></tr>'}).join("")}
        </table>`:'<div class="empty-msg">📒 暂无记账记录，开始记一笔吧～</div>'}
        
        ${e.length>0?'<div style="text-align:right;margin-top:8px;"><button class="btn-danger btn-sm" onclick="clearAll()">🗑️ 清空全部</button></div>':""}
      </div>
    `}window.addEntry=function(){const r=document.getElementById("l-date").value,o=document.getElementById("l-desc").value.trim(),c=document.getElementById("l-type").value,i=document.getElementById("l-debit").value,a=document.getElementById("l-credit").value,s=parseFloat(document.getElementById("l-amount").value);if(!o){alert("请输入摘要");return}if(!s||s<=0){alert("请输入有效金额");return}if(i===a){alert("借方和贷方不能相同！有借必有贷，借贷必相等 😅");return}e.push({date:r,desc:o,type:c,debit:i,credit:a,amount:s}),n(),t(),document.getElementById("l-desc").value="",document.getElementById("l-amount").value=""},window.delEntry=function(s){confirm("确定删除这条记录？")&&(e.splice(s,1),n(),t())},window.clearAll=function(){confirm("确定清空全部记账记录？")&&(e=[],n(),t())},document.addEventListener("DOMContentLoaded",t),document.getElementById("ledger-app")&&t()})()</script></div></main><footer class=footer><span>&copy; 2026 <a href=https://mrzhangyingjian.github.io/myblog/>Chris 的博客</a></span> ·
